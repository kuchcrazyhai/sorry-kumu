<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Will You Forgive Me?</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <link rel="stylesheet" href="page4.css">

</head>

<body>

    <!-- Floating Background -->
    <div id="particles"></div>

    <!-- Top Right Button -->
    <button class="top-icon">
        <i class="fa-solid fa-volume-xmark"></i>
    </button>

    <!-- Main Content -->
    <div class="container">

        <h1 class="title">
            Will you forgive me?
        </h1>

        <p class="subtitle">
            I'm truly sorry, Kumu.
        </p>

        <p class="subtitle2">
            I also have a surprise for you.
        </p>

        <button
            class="forgive-btn"
            id="forgiveBtn">

            Yes, I forgive you 💗

        </button>

    </div>

    <!-- Bottom Heart Button -->

    <button class="heart-btn">

        <i class="fa-solid fa-heart"></i>

    </button>

    <script src="page4.js"></script>

</body>

</html>
