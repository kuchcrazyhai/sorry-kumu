<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Smile 😊</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <link rel="stylesheet" href="page3.css">

</head>

<body>

    <!-- Background -->

    <div class="background-glow"></div>

    <!-- Top Icon -->

    <button class="top-icon">
        <i class="fa-solid fa-volume-xmark"></i>
    </button>

    <!-- Main -->

    <main class="container">

        <h1 class="heading">
            Just Watch This... 💜
        </h1>


        <!-- Video Card -->

        <div class="video-card">
<video
    id="video"
    class="video"
    controls
    controlsList="nofullscreen nodownload noremoteplayback"
    disablePictureInPicture
    preload="auto">

    <source src="assets/smile-video.mp4" type="video/mp4">

</video>

        </div>

        <!-- Progress -->

        <div class="progress-wrapper">

            <div class="progress">

                <div class="progress-fill" id="progressFill"></div>

            </div>

            <div class="time">

                <span id="currentTime">00:00</span>

                <span id="duration">00:30</span>

            </div>

        </div>

    
        <!-- Hidden Button -->

        <buttono
            id="smileBtn"
            class="smile-btn">

            hehe😂🤣🤣

        </button>

    </main>

    <!-- Bottom Heart -->

    <button class="heart-btn">

        <i class="fa-solid fa-heart"></i>

    </button>

    <script src="page3.js"></script>

</body>

</html>
