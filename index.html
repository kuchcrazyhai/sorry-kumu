<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Hey Kinza ❤️</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;500;600&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Animated Background -->
    <div id="particles"></div>

    <!-- Top Right Button -->
    <button class="top-icon">
        <i class="fa-solid fa-circle-half-stroke"></i>
    </button>

    <!-- Main Container -->
    <main class="container">

        <!-- GIF -->
        <div class="gif-box">
            <img src="assets/cat.gif" alt="Cute Cat" class="cat-gif">
        </div>

        <!-- Heading -->
        <h1 class="title">
            Hey Kumu...
        </h1>

        <!-- Subtitle -->
        <h2 class="subtitle">
            Before we move forward...
        </h2>

        <!-- Description -->
        <p class="description">
            I just wanted to ask if you're still upset with me...
            <br>
            I know things haven't been perfect,
            <br>
            but I'd really love a chance to make you smile again.
        </p>

        <!-- Buttons -->
        <div class="buttons">

            <button class="btn primary" id="yesBtn">
                Okay, go ahead...
            </button>

            <button class="btn secondary" id="noBtn">
                No, I'm still mad
            </button>

        </div>

    </main>

    <!-- Bottom Floating Button -->
    <button class="music-btn">
        <i class="fa-solid fa-heart"></i>
    </button>

    <!-- Popup Modal -->
<div class="popup-overlay" id="popup">

    <div class="popup-card">

        <img src="assets/sadcat.jpg" class="popup-cat">

        <h2>Please Kumu...</h2>

        <p>
            Just give me one chance...
            <br>
            I really want to say sorry.
            Please?
        </p>

        <button id="popupYes">
            Okay, go ahead
        </button>

    </div>

</div>
    <!-- JS -->
    <script src="script.js"></script>

</body>

</html>
