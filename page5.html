<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Thank You ❤️</title>

    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <link rel="stylesheet" href="page5.css">

</head>

<body>

    <!-- Floating Dots -->
    <div id="particles"></div>

    <!-- Top Right -->
    <button class="top-icon">
        <i class="fa-solid fa-volume-xmark"></i>
    </button>

    <!-- Main Content -->

    <div class="container">

        <!-- GIF -->

        <div class="gif-frame">

            <img
                src="assets/thankyou-cat.gif"
                class="gif"
                alt="Cute GIF">

        </div>

        <!-- Text -->

        <h1 class="title">
            Thank you, Kumu.
        </h1>

        <p class="subtitle">
            You're the best person in the world.
        </p>

        <h2 class="love">
            Some bonds are meant to last a lifetime.
        </h2>

        <p class="sign">
            — With all my respect, Nikhil —
        </p>

        <button
            class="special-btn"
            id="specialBtn">

            Something Special For You...

        </button>

    </div>

    <!-- Bottom Heart -->

    <button class="heart-btn">

        <i class="fa-solid fa-heart"></i>

    </button>

    <script src="page5.js"></script>

</body>

</html>
